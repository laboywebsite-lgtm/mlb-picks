<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Laboy Picks ⚾</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e2e8f0;font-family:'Inter',system-ui,sans-serif;
      min-height:100vh;padding:0 0 60px}
/* Header */
.header{background:linear-gradient(135deg,#1a1f2e 0%,#0f1117 100%);
         border-bottom:1px solid #1e293b;padding:16px 20px 14px;
         display:flex;align-items:center;justify-content:space-between;
         position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:10px}
.logo svg{width:32px;height:32px}
.logo-text{font-size:1.15rem;font-weight:900;letter-spacing:-.3px}
.logo-text span{color:#f97316}
.refresh-btn{background:#1e293b;border:1px solid #334155;border-radius:10px;
              color:#94a3b8;font-size:.78rem;font-weight:600;
              padding:8px 14px;cursor:pointer;transition:all .2s;
              display:flex;align-items:center;gap:6px;font-family:inherit}
.refresh-btn:hover{background:#334155;color:#e2e8f0;border-color:#f97316}
.refresh-btn.loading svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Date badge */
.date-badge{text-align:center;font-size:.72rem;color:#475569;
             padding:10px 0 0;letter-spacing:.05em}
/* Container */
.container{max-width:540px;margin:0 auto;padding:20px 16px 0}
/* Section */
.section{margin-bottom:24px}
.sec-header{font-size:.68rem;font-weight:700;letter-spacing:.14em;
             color:#475569;text-transform:uppercase;
             margin-bottom:10px;padding:0 2px;
             display:flex;align-items:center;gap:8px}
.sec-header::after{content:'';flex:1;height:1px;background:#1e293b}
/* Cards list */
.card-list{display:flex;flex-direction:column;gap:9px}
.card{display:flex;align-items:center;justify-content:space-between;
       background:#141820;border:1px solid #1e293b;border-radius:12px;
       padding:13px 16px;text-decoration:none;color:#e2e8f0;
       transition:border-color .18s,background .18s}
.card:hover{background:#1a2030;border-color:#f97316}
.card-left{display:flex;align-items:center;gap:10px}
.card-icon{font-size:1.1rem;line-height:1}
.card-name{font-size:.88rem;font-weight:600;line-height:1.3}
.card-date{font-size:.7rem;color:#64748b;margin-top:2px}
.card-arrow{color:#475569;font-size:.9rem}
/* Picks grid */
.pick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pick-item{border-radius:10px;overflow:hidden;
            border:1px solid #1e293b;background:#141820;
            transition:border-color .18s;position:relative}
.pick-item:hover{border-color:#f97316}
.pick-item img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.pick-label{font-size:.62rem;font-weight:700;color:#94a3b8;
             text-align:center;padding:5px 4px 6px;background:#141820}
/* Archive toggle */
.archive-toggle{display:flex;align-items:center;justify-content:space-between;
                  background:#0f1117;border:1px solid #1e293b;border-radius:12px;
                  padding:13px 16px;cursor:pointer;margin-top:10px;
                  transition:border-color .18s;user-select:none}
.archive-toggle:hover{border-color:#f97316}
.archive-toggle-label{font-size:.85rem;font-weight:600;color:#64748b;
                        display:flex;align-items:center;gap:8px}
.archive-toggle-count{font-size:.72rem;color:#475569}
.archive-toggle-arrow{color:#475569;transition:transform .2s;font-size:.85rem}
.archive-toggle.open .archive-toggle-arrow{transform:rotate(90deg)}
/* Archive content */
.archive-content{display:none;margin-top:12px}
.archive-content.open{display:block}
.archive-date-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;
                      color:#f97316;text-transform:uppercase;
                      padding:10px 2px 8px;border-bottom:1px solid #1e293b;
                      margin-bottom:8px}
.archive-date-group{margin-bottom:16px}
/* Empty state */
.empty{text-align:center;color:#475569;padding:24px;
        font-size:.82rem;border-radius:12px;border:1px dashed #1e293b}
/* Loading */
.loading-state{text-align:center;padding:40px 20px;color:#475569;font-size:.85rem}
.loading-dot{display:inline-block;animation:blink 1.2s infinite}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
/* Footer */
.footer{text-align:center;font-size:.65rem;color:#334155;margin-top:32px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <!-- MLB Baseball icon -->
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="15" fill="#CC0000" stroke="#990000" stroke-width="1"/>
      <circle cx="16" cy="16" r="15" fill="url(#ball)" stroke="#8B0000" stroke-width="1.5"/>
      <defs>
        <radialGradient id="ball" cx="35%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#E83030"/>
          <stop offset="100%" stop-color="#A50000"/>
        </radialGradient>
      </defs>
      <path d="M7 10 Q10 8 13 10 Q16 12 19 10 Q22 8 25 10" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M6 16 Q10 14 14 16 Q18 18 22 16 Q26 14 27 16" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M7 22 Q10 20 13 22 Q16 24 19 22 Q22 20 25 22" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>
    <div class="logo-text">Laboy <span>Picks</span></div>
  </div>
  <button class="refresh-btn" onclick="loadManifest(true)" id="refreshBtn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 4v6h-6M1 20v-6h6"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
    Refresh
  </button>
</div>

<div class="date-badge" id="dateBadge">Cargando...</div>

<div class="container">
  <div id="appContent">
    <div class="loading-state">
      Cargando picks<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span>
    </div>
  </div>
</div>

<script>
const MANIFEST_URL = "https://laboywebsite-lgtm.github.io/mlb-picks/manifest.json?" + Date.now();

function formatDate(d) {
  if (!d) return "";
  const months = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const [y,m,day] = d.split("-").map(Number);
  return `${months[m-1]} ${day}, ${y}`;
}

function pickLabel(name) {
  // Extract "Pick #N" from filename
  const m = name.match(/#(\d+)/);
  return m ? `Pick #${m[1]}` : "Pick";
}

function cardIcon(file) {
  if (file.name.includes("Lines")) return "📊";
  if (file.name.includes("Model Card") || file.name.includes("Model Record")) return "🏆";
  if (file.name.includes("Record")) return "📈";
  if (file.name.includes("Picks")) return "🎯";
  return "📄";
}

function cardName(file) {
  let n = file.name.replace(/\.html$/, "").replace(/^Laboy /, "");
  // Strip hash suffix like "-276996e"
  n = n.replace(/-[0-9a-f]{7}$/, "");
  return n;
}

function buildSection(title, files, renderer) {
  if (!files.length) return "";
  return `<div class="section">
  <div class="sec-header">${title}</div>
  ${renderer(files)}
</div>`;
}

function renderCardList(files) {
  return `<div class="card-list">${files.map(f => `
  <a href="${f.url}" target="_blank" class="card">
    <div class="card-left">
      <span class="card-icon">${cardIcon(f)}</span>
      <div>
        <div class="card-name">${cardName(f)}</div>
        ${f.date ? `<div class="card-date">${formatDate(f.date)}</div>` : ""}
      </div>
    </div>
    <span class="card-arrow">›</span>
  </a>`).join("")}</div>`;
}

function renderPickGrid(imgs) {
  if (!imgs.length) return `<div class="empty">No hay picks publicados aún.</div>`;
  return `<div class="pick-grid">${imgs.map(f => `
  <a href="${f.url}" target="_blank" class="pick-item">
    <img src="${f.url}" alt="${f.name}" loading="lazy">
    <div class="pick-label">${pickLabel(f.name)}</div>
  </a>`).join("")}</div>`;
}

function renderArchiveContent(archiveImgs) {
  if (!archiveImgs.length) return `<div class="empty">No hay picks anteriores.</div>`;
  // Group by date
  const byDate = {};
  archiveImgs.forEach(f => {
    const d = f.date || "Sin fecha";
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(f);
  });
  const sorted = Object.keys(byDate).sort((a,b) => b.localeCompare(a));
  return sorted.map(d => `
  <div class="archive-date-group">
    <div class="archive-date-label">${formatDate(d) || d}</div>
    <div class="pick-grid">${byDate[d].map(f => `
      <a href="${f.url}" target="_blank" class="pick-item">
        <img src="${f.url}" alt="${f.name}" loading="lazy">
        <div class="pick-label">${pickLabel(f.name)}</div>
      </a>`).join("")}</div>
  </div>`).join("");
}

async function loadManifest(forceRefresh) {
  const btn = document.getElementById("refreshBtn");
  if (btn) btn.classList.add("loading");
  const url = "https://laboywebsite-lgtm.github.io/mlb-picks/manifest.json&t=" + Date.now();
  try {
    const res = await fetch(url, {cache: "no-store"});
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    renderApp(data);
  } catch(e) {
    document.getElementById("appContent").innerHTML =
      `<div class="empty" style="margin-top:24px">Error cargando datos: ${e.message}</div>`;
  } finally {
    if (btn) btn.classList.remove("loading");
  }
}

function renderApp(data) {
  const files = data.files || [];
  const today = new Date().toISOString().slice(0,10);

  // Separate by type
  const picksFiles  = files.filter(f => f.type === "picks");
  const linesFiles  = files.filter(f => f.type === "lines");
  const modelCards  = files.filter(f => f.type === "record" && f.subtype === "model_record");
  const myRecord    = files.filter(f => f.type === "record" && f.subtype === "my_record");
  const todayImgs   = files.filter(f => f.type === "mypick_img" && f.subtype === "today");
  const archiveImgs = files.filter(f => f.type === "mypick_img" && f.subtype === "archive");

  // Update date badge
  document.getElementById("dateBadge").textContent =
    new Date().toLocaleDateString("es-PR", {weekday:"long",year:"numeric",month:"long",day:"numeric"})
               .replace(/^./,c=>c.toUpperCase());

  // Build archive toggle
  const archiveToggle = `
  <div class="archive-toggle" id="archiveToggle" onclick="toggleArchive()">
    <div class="archive-toggle-label">
      <span>📁</span> Archivo de Picks
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="archive-toggle-count">${archiveImgs.length} foto(s)</span>
      <span class="archive-toggle-arrow">›</span>
    </div>
  </div>
  <div class="archive-content" id="archiveContent">
    ${renderArchiveContent(archiveImgs)}
  </div>`;

  // Build mis picks section
  const misPicksHtml = `<div class="section">
  <div class="sec-header">📸 Mis Picks</div>
  ${renderPickGrid(todayImgs)}
  ${archiveToggle}
</div>`;

  const html = [
    buildSection("🎯 Picks del Modelo", picksFiles, renderCardList),
    buildSection("📊 Lines del Modelo", linesFiles, renderCardList),
    buildSection("🏆 Model Card", modelCards, renderCardList),
    buildSection("📈 Mi Récord", myRecord, renderCardList),
    misPicksHtml,
    `<div class="footer">Laboy Picks ⚾ · Solo uso personal</div>`
  ].join("");

  document.getElementById("appContent").innerHTML = html;
}

function toggleArchive() {
  const toggle = document.getElementById("archiveToggle");
  const content = document.getElementById("archiveContent");
  toggle.classList.toggle("open");
  content.classList.toggle("open");
}

// Auto-load on start
loadManifest(false);
</script>
</body>
</html>
